                  - generic [ref=e181]: "8 text: \"今天天气真好呀～\""
              - paragraph [ref=e182]: 定义完结构，一个 yaml 文件就对应了一个四格故事，把这个内容丢给 AI 生图的工具，就能得到对应的图片。
              - paragraph [ref=e183]
              - separator [ref=e184]
              - heading "2. 关于 AI 生图工具与质量" [level=4] [ref=e185]
              - paragraph [ref=e186]: "我的理念是: 文本是一种序列的约定："
              - blockquote [ref=e187]:
                - paragraph [ref=e188]:
                  - text: 它可以视为一个四格漫画的
                  - strong [ref=e189]: 基因
                  - text: ，而 AI 工具会将基因
                  - code [ref=e190]: 实例化
                  - text: 为个体。
              - paragraph [ref=e191]:
                - text: 所以，生成图的好坏取决于两个因素：
                - code [ref=e192]: 基因序列
                - text: 和
                - code [ref=e193]: 成长环境
                - text: "。也就是提示词好不好，以及 AI 工具厉不厉害。 AI 生图的工具有很多，单目前大多数，对于标准的四格漫画都无法准确输出，下面列举几个:"
              - list [ref=e194]:
                - listitem [ref=e195]:
                  - strong [ref=e196]: 即梦 AI
              - paragraph [ref=e197]
              - list [ref=e198]:
                - listitem [ref=e199]:
                  - strong [ref=e200]: 豆包
              - paragraph [ref=e201]
              - list [ref=e202]:
                - listitem [ref=e203]:
                  - strong [ref=e204]: Nano Banana
              - paragraph [ref=e205]
              - paragraph [ref=e206]:
                - text: 目前来看，国产的 AI 仍有很大的进步空间，Nano Banana 能符合我对图片产品的预期。但是 AI 正在蓬勃发展中， AI 生图也是最近一两年才逐渐可用的，我对他们的未来持有乐观的态度，包括我们国产的大模型。所以如果
                - code [ref=e207]: 成长环境
                - text: 将会越来越好，那么
                - code [ref=e208]: 基因序列
                - text: 本身将会成为非常重要的因素。
                - text: 目前我只是简单设计了一下
                - code [ref=e209]: yaml
                - text: ，按照版本控制，称为
                - code [ref=e210]: v0.0.1
                - text: 吧，后续随着创作需求的升级，我也会逐步迭代整体结构，设计更合理的 DNA 结构 😁
              - separator [ref=e211]
              - heading "3. 选定方向? Flow Heart" [level=4] [ref=e212]
              - blockquote [ref=e213]:
                - paragraph [ref=e214]: 有人问我，你是怎么想到这些稀奇古怪的方向的，而且你是怎么坚持下来的。
              - paragraph [ref=e215]: 对于一个创作者来说，拓宽自己的边界是一个很必要的事。特别是对一个编程创作者，广泛涉猎是家常便饭。使用一切手段，解决自己遇到的问题；没有问题时就去发展自己，在新的领域中寻找问题。至于坚持嘛，遵循内心的指引，做自己喜欢的事，是不需要坚持的，就像你每天都要喝水一样自然。
              - paragraph [ref=e216]: 可能有人会问，如果 AI 的笑话漫画没有火，你还会坚持下去吗？刚做前两个漫画文章时，还没有火，一天收入 1 块钱，我已经觉得很美滋滋了。投入的产出符合我的预期，毕竟只需要准备个笑话雏形，其他都交给 AI 写就行了。我还和女朋友炫耀：
              - table [ref=e217]:
                - rowgroup [ref=e218]:
                  - row "- -" [ref=e219]:
                    - columnheader "-" [ref=e220]
                    - columnheader "-" [ref=e221]
                - rowgroup [ref=e222]:
                  - row [ref=e223]:
                    - cell [ref=e224]
                    - cell [ref=e225]
              - paragraph [ref=e226]: 最后还是想强调一点：如果一件事，对社会、对他人没有危害，自己做着觉得开心，起来没有负担和压力，就会大胆去做。反之，可以在其他方面继续延伸，找到自己喜欢的那个领域。AI 工具的加持，让个体拥有了前所未有的能力，个人的边界可以极度拓宽。
              - separator [ref=e227]
              - heading "4. 为什么会火？" [level=4] [ref=e228]
              - paragraph [ref=e229]:
                - text: 第一次感觉会火，是因为
                - link "擎天柱" [ref=e230] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=https%3A%2F%2Fmp.weixin.qq.com%2Fs%2FXe85NV6MyPKkpn1yBypO-w
                - text: 这篇，浏览量异常上升：
              - paragraph [ref=e231]
              - paragraph [ref=e232]:
                - text: 从数据统计来看，发布第一天只有
                - code [ref=e233]: "102"
                - text: 个浏览量，和往常没什么区别。持续一周，没有任何波澜，突然在
                - code [ref=e234]: 12-20
                - text: 号，增加了近 5000 的浏览量，第二天持续上涨过万，然后逐渐平息：
              - paragraph [ref=e235]
              - separator [ref=e236]
              - paragraph [ref=e237]:
                - text: 在第一篇爆火的后一天，
                - link "慧心一笑#03 | 爸爸去钓鱼~" [ref=e238] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=https%3A%2F%2Fmp.weixin.qq.com%2Fs%2FD2w8-ar9rnVQV3_TG962cA
                - text: 数据开始上升，感觉像是连带效应：
              - paragraph [ref=e239]
              - paragraph [ref=e240]
              - separator [ref=e241]
              - paragraph [ref=e242]:
                - text: 为了验证一下是不是偶然火爆，我在 20号和 21 号又发表了两篇小笑话。结果不温不火，似乎感觉也不是必然的。 在 23 号，我发布了
                - link "慧心一笑#06 | 被美杜莎石化..." [ref=e243] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=https%3A%2F%2Fmp.weixin.qq.com%2Fs%2FyAQXh0UbMMU5cI5nmSJYWw
                - text: ，这篇在当晚直接火爆，
              - paragraph [ref=e244]
              - paragraph [ref=e245]: 从数据来看，第二天浏览量直接过 2.6W，后面还有持续几天的流量：
              - paragraph [ref=e246]
              - paragraph [ref=e247]:
                - text: 至于为什么火爆，从阅读渠道构成来看
                - code [ref=e248]: 98.7%
                - text: 的阅读量来自于公众号推荐。只能说是老天喂饭吃 ~
              - paragraph [ref=e249]
              - separator [ref=e250]
              - heading "5. 小结一下" [level=4] [ref=e251]
              - paragraph [ref=e252]:
                - text: 接下来几天的
                - link "慧心一笑#07 | 爸爸回来了..." [ref=e253] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=https%3A%2F%2Fmp.weixin.qq.com%2Fs%2FlOUrPCfYJWKTNSwkhcE6JQ
                - text: 和
                - link "慧心一笑#09 | 农夫与蛇" [ref=e254] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=https%3A%2F%2Fmp.weixin.qq.com%2Fs%2FrS1bGeTldt1a6veIg4f_sw
                - text: 也阅读过 3万。目前慧心一笑系列发布了 9 篇，阅读量超过 2.5W 的爆款有 5 篇，比例算是很高了。
              - paragraph [ref=e255]:
                - text: 感觉微信公众号的推荐阅读机制应该有所变化。另外也不是每篇都会火爆，应该和作品本身质量、流传度也有关系。这个有趣的现象让我非常欣喜，后续我还会继续创作更有意思的四格漫画，来继续验证数据。大家也可以关注
                - link "《编程之王》" [ref=e256] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=
                - text: 公众号和我一起见证。等到第 30 篇后，我会再写一个复盘报告，和大家分享。
