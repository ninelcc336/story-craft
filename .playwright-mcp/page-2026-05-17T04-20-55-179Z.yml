              - heading "1. 缘起" [level=4] [ref=e100]
              - paragraph [ref=e101]:
                - text: 先简单介绍一下：我是一个籍籍无名的编程技术小博主，全网统一名号
                - code [ref=e102]: 张风捷特烈
                - text: 。
                - link "编程之王" [ref=e103] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=https%3A%2F%2Fmp.weixin.qq.com%2Fs%2FyAQXh0UbMMU5cI5nmSJYWw
                - text: 是我维护的公众号，一直是输出编程技术的文章，主要以 Flutter 技术为主。
                - text: 但技术文章更新的不是非常频繁，而公众号每天有一篇发文的机会。本着
                - code [ref=e104]: 不想浪费
                - text: 的优良传统，在 AI 重塑一切的浪潮中，我想用 AI 画些四格漫画的笑话试试。于是开启了
                - strong [ref=e105]: 慧心一笑
                - text: 专栏，
                - link "《小火柴的倒霉日常》" [ref=e106] [cursor=pointer]:
                  - /url: https://link.juejin.cn?target=https%3A%2F%2Fmp.weixin.qq.com%2Fs%2FHtpVgVF7HZlqrVS37-R82w
                - text: 就是第一篇，现在还没火。大家也可以点开看看，内容非常精简，就是一幅图+提示词。
              - paragraph [ref=e107]
              - paragraph [ref=e108]: 这个系列整体是诙谐幽默的，下面是第一篇的内容：
              - paragraph [ref=e109]
              - paragraph [ref=e110]:
                - text: 一开始我是用自然语言的提示词，感觉效果并不是太好，四格漫画有着连续的信息和一致性的人物、场景等。由于编程出身，在
                - strong [ref=e111]: 结构一致性
                - text: 方面有着天然的敏锐嗅觉。于是基于 yaml 文件来定义统一的场景、角色、样式、色调等信息：
              - generic [ref=e112]:
                - generic [ref=e113]:
                  - generic [ref=e114]:
                    - img [ref=e116]
                    - generic [ref=e118]: yaml
                  - generic [ref=e119]:
                    - generic [ref=e120]:
                      - img [ref=e121]
                      - generic [ref=e134]: 体验AI代码助手
                    - generic [ref=e135]: 复制代码
                - code [ref=e136]:
                  - generic [ref=e137]: "1 comic_info:"
                  - generic [ref=e138]: "2 type: \"四格漫画\""
                  - generic [ref=e139]: "3 style: \"手绘简笔画、柔软线条、轻松冷幽默、统一角色\""
                  - generic [ref=e140]: "4 color_scheme: \"暖黄主色调，红橙色点缀，柔和明暗层次\""
                  - generic [ref=e141]: "5 character:"
                  - generic [ref=e142]: "6 name: \"小火柴\""
                  - generic [ref=e143]: "7 appearance: \"细长圆柱身体、红色火柴头、两根短竖眉毛、圆点眼睛、呆萌可爱\""
                  - generic [ref=e144]: "8 personality: \"迷糊、天真、略倒霉\""
                  - generic [ref=e145]: "9 background_style: \"白色简约背景，搭配少量手绘街景或物件增强生活感\""
              - paragraph [ref=e146]:
                - text: 面板列表放在
                - code [ref=e147]: panels
                - text: 节点下，每个宫格由
                - code [ref=e148]: panel[x]
                - text: 固定场景内容。包括描述、场景、动作、表情、细节、文本等：
              - generic [ref=e149]:
                - generic [ref=e150]:
                  - generic [ref=e151]:
                    - img [ref=e153]
                    - generic [ref=e155]: yaml
                  - generic [ref=e156]:
